<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Inventory Alerts
  </title>




  <!-- GLOBAL PROJECT CSS -->

  <link
    rel="stylesheet"
    href="../style.css"
  >




  <!-- ALERT PAGE CSS -->

  <link
    rel="stylesheet"
    href="alert.css"
  >

</head>

<body>




  <!-- MAIN CONTAINER -->

  <div class="container">




    <!-- PAGE TITLE -->

    <h1>
      Inventory Alerts
    </h1>




    <!-- BACK BUTTON -->

    <a
      href="../index.html"
      class="back-btn"
    >
      &larr; Back to Dashboard
    </a>




    <!-- SEARCH INPUT -->

    <input
      type="text"
      id="search"
      placeholder="Search medicines..."
    >




    <!-- SUMMARY SECTION -->

    <div class="summary-container">




      <!-- EXPIRED -->

      <div class="summary-card red">

        <h3 id="expired-count">
          0
        </h3>

        <p>
          Expired
        </p>

      </div>




      <!-- EXPIRING SOON -->

      <div class="summary-card yellow">

        <h3 id="expiring-count">
          0
        </h3>

        <p>
          Expiring Soon
        </p>

      </div>




      <!-- LOW STOCK -->

      <div class="summary-card blue">

        <h3 id="lowstock-count">
          0
        </h3>

        <p>
          Low Stock
        </p>

      </div>

    </div>




    <!-- EXPIRED PRODUCTS SECTION -->

    <div id="expired-container"></div>




    <!-- EXPIRING SOON SECTION -->

    <div id="expiring-container"></div>




    <!-- LOW STOCK SECTION -->

    <div id="lowstock-container"></div>

  </div>




  <!-- JAVASCRIPT FILE -->

  <script src="alert.js"></script>

</body>

</html>
